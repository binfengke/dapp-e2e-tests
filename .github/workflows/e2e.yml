name: dApp E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dapp_url:
        description: "dApp URL to run E2E against (must be reachable from GitHub runner)"
        required: true
        default: "https://your-dapp.example.com"
      rpc_url:
        description: "RPC URL (e.g., Sepolia)"
        required: true
        default: "https://rpc.sepolia.org"
      chain_id:
        description: "Chain ID (e.g., 11155111 for Sepolia)"
        required: true
        default: "11155111"
      token_contract:
        description: "ERC-20 token contract address (optional depending on tests)"
        required: false
        default: ""
      nft_contract:
        description: "ERC-721 NFT contract address (optional depending on tests)"
        required: false
        default: ""

env:
  NODE_VERSION: "18"

jobs:
  lint-and-typecheck:
    name: Type Check & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests (MetaMask helper)
        run: npx playwright test tests/metamask-helper.spec.ts

      - name: Verify project structure
        run: |
          echo "=== Checking project structure ==="
          test -f playwright.config.ts && echo "✅ Playwright config"
          test -f src/pages/BasePage.ts && echo "✅ BasePage"
          test -f src/pages/DAppPage.ts && echo "✅ DAppPage"
          test -f src/pages/MetaMaskHelper.ts && echo "✅ MetaMaskHelper"
          test -f src/fixtures/dapp.fixture.ts && echo "✅ Test fixtures"
          test -f src/utils/blockchain.ts && echo "✅ Blockchain utils"
          ls tests/*.spec.ts && echo "✅ Test specs found"
          echo "=== Structure verified ==="

  e2e-tests:
    name: Full Playwright E2E (manual)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Preflight (required secrets)
        run: |
          if [ -z "${SEED_PHRASE}" ] || [ -z "${WALLET_PASSWORD}" ]; then
            echo "Missing required secrets. Configure repository secrets: SEED_PHRASE and WALLET_PASSWORD."
            exit 1
          fi
        env:
          SEED_PHRASE: ${{ secrets.SEED_PHRASE }}
          WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD }}

      - name: Run E2E tests
        run: npx playwright test --reporter=html
        env:
          DAPP_URL: ${{ inputs.dapp_url }}
          RPC_URL: ${{ inputs.rpc_url }}
          CHAIN_ID: ${{ inputs.chain_id }}
          TOKEN_CONTRACT: ${{ inputs.token_contract }}
          NFT_CONTRACT: ${{ inputs.nft_contract }}
          SEED_PHRASE: ${{ secrets.SEED_PHRASE }}
          WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
